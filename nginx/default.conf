log_format json_combined escape=json
'{'
  '"time":"$time_iso8601",'
  '"remote_addr":"$remote_addr",'
  '"method":"$request_method",'
  '"path":"$request_uri",'
  '"status":$status,'
  '"size":$body_bytes_sent,'
  '"referer":"$http_referer",'
  '"user_agent":"$http_user_agent",'
  '"request_time":$request_time'
'}';

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    access_log /dev/stdout json_combined;
    server_name localhost;

    include /etc/nginx/snippets/redirects.conf;

    # ReportD (https://reportd.natwelch.com) — browser reports + NEL, same pattern as writing.natwelch.com
    add_header NEL '{"report_to":"default","max_age":2592000,"include_subdomains":true}' always;
    add_header Report-To '{"group":"default","max_age":10886400,"endpoints":[{"url":"https://reportd.natwelch.com/report/pseudoweb"}]}' always;
    add_header Reporting-Endpoints 'default="https://reportd.natwelch.com/reporting/pseudoweb"' always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; script-src 'self' https://unpkg.com; connect-src https://reportd.natwelch.com; report-uri https://reportd.natwelch.com/report/pseudoweb; report-to default" always;

    root /usr/share/nginx/html;

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
